<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>GoodDining Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>GoodDining Agent</h1>
      <p class="subtitle">체형/목표에 맞는 하루 식단을 추천해드려요 (전문 의료·영양 상담을 대체하지 않습니다)</p>
    </header>
    <main id="messages"></main>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="예: 30살 여자, 키 160cm, 몸무게 55kg, 활동량 보통, 살 빼고 싶어" autocomplete="off" />
      <button type="submit">전송</button>
    </form>
  </div>
  <script src="/static/chat.js"></script>
</body>
</html>
