<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>GoodDining Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>GoodDining Agent</h1>
      <p class="subtitle">체형/목표에 맞는 하루 식단을 추천해드려요 (전문 의료·영양 상담을 대체하지 않습니다)</p>
    </header>
    <div class="main-layout">
      <main id="messages"></main>
      <aside class="sidebar">
        <section class="profile-panel">
          <h2>내 정보</h2>
          <p class="profile-hint">입력/수정은 채팅으로 말씀해주세요.</p>
          <button type="button" id="profile-view-btn">내 정보 보기</button>
        </section>
        <section class="calendar">
          <div class="calendar-header">
            <button type="button" id="cal-prev">‹</button>
            <span id="cal-month-label"></span>
            <button type="button" id="cal-next">›</button>
          </div>
          <div class="calendar-weekdays">
            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </section>
        <section class="day-panel">
          <h2 id="panel-title">오늘의 식단</h2>
          <div id="panel-content" class="panel-content">아직 추천받은 식단이 없어요.</div>
        </section>
      </aside>
    </div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="예: 30살 여자, 키 160cm, 몸무게 55kg, 활동량 보통, 살 빼고 싶어" autocomplete="off" />
      <button type="submit">전송</button>
    </form>
  </div>
  <div id="profile-modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>내 정보</h2>
        <button type="button" id="profile-modal-close" class="modal-close">×</button>
      </div>
      <div id="profile-modal-content" class="panel-content">불러오는 중...</div>
    </div>
  </div>
  <script src="/static/chat.js"></script>
</body>
</html>
